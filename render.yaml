databases:
  - name: credit-report-db
    databaseName: credit_report
    user: credit_report_user
    plan: starter

services:
  - type: web
    name: finance-analysis-agent
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: MEMORY_ROOT
        value: /tmp/memory
      - key: AGENT_PROVIDER_ORDER
        value: cerebras,groq,nvidia,gemini,openrouter,cloudflare,fireworks,mistral,aws
      - key: MISTRAL_TIMEOUT_SEC
        value: "15"
      - key: DEBUG
        value: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: FIREWORKS_API_KEY
        sync: false
      - key: FIREWORKS_MODEL
        value: accounts/fireworks/models/minimax-m2p7
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CF_API_TOKEN
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      # Credit Report AI Pipeline
      - key: DATABASE_URL
        fromDatabase:
          name: credit-report-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CREDIT_REPORT_MODEL
        value: claude-sonnet-4-6
      - key: CR_SECTION_MAX_TOKENS
        value: "8192"
      - key: CR_MAX_CONCURRENT_GENERATIONS
        value: "2"
      - key: CREDIT_REPORTS_ROOT
        value: /tmp/credit_reports
      - key: CR_MAX_CHUNKS_PER_SECTION
        value: "12"
      - key: CREDIT_REPORT_MAX_UPLOAD_MB
        value: "50"
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
